version: '3.8'

services:
  # Local Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Local LLM Engine
  ollama:
    image: ollama/ollama:latest
    container_name: local_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  # Core API and RAG Core Application
  api-gateway:
    build: .
    container_name: fastapi_rag_gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - qdrant
      - ollama

volumes:
  qdrant_storage:
  ollama_storage: